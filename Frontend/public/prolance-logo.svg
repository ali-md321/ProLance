<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0e1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#0a0c18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0c18"/>
  <circle cx="100" cy="100" r="95" fill="url(#bgGlow)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#moonGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Outer dashed ring accent -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.25"/>

  <!-- Moon shape (crescent) -->
  <g filter="url(#softglow)">
    <!-- Main moon disc -->
    <circle cx="96" cy="105" r="52" fill="url(#moonGrad)" opacity="0.9"/>
    <!-- Cutout to make crescent -->
    <circle cx="114" cy="93" r="42" fill="#0a0c18"/>
  </g>

  <!-- Moon inner glow rim -->
  <circle cx="96" cy="105" r="52" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.5"/>

  <!-- Star top-right (small sparkle) -->
  <g filter="url(#glow)" opacity="0.95">
    <polygon points="138,42 140.5,48.5 147,51 140.5,53.5 138,60 135.5,53.5 129,51 135.5,48.5"
      fill="url(#moonGrad)"/>
  </g>

  <!-- Tiny star dots -->
  <circle cx="155" cy="68" r="2" fill="#c084fc" opacity="0.7" filter="url(#glow)"/>
  <circle cx="148" cy="80" r="1.2" fill="#818cf8" opacity="0.6"/>
  <circle cx="162" cy="55" r="1.5" fill="#a5b4fc" opacity="0.5"/>

  <!-- Laptop base -->
  <rect x="62" y="118" width="76" height="5" rx="2.5" fill="url(#personGrad)" opacity="0.9"/>
  <!-- Laptop screen -->
  <rect x="68" y="88" width="64" height="32" rx="4" fill="url(#screenGrad)" stroke="#6366f1" stroke-width="1.2"/>
  <!-- Screen glow lines -->
  <rect x="74" y="96" width="28" height="3" rx="1.5" fill="#6366f1" opacity="0.8"/>
  <rect x="74" y="102" width="44" height="2" rx="1" fill="#4f46e5" opacity="0.5"/>
  <rect x="74" y="107" width="36" height="2" rx="1" fill="#4f46e5" opacity="0.4"/>
  <!-- Screen shine -->
  <rect x="68" y="88" width="64" height="32" rx="4" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Person sitting - body -->
  <ellipse cx="100" cy="115" rx="10" ry="5" fill="url(#personGrad)" opacity="0.8"/>
  <!-- Person - torso -->
  <rect x="94" y="98" width="12" height="18" rx="5" fill="url(#personGrad)"/>
  <!-- Person - head -->
  <circle cx="100" cy="93" r="8" fill="url(#personGrad)"/>
  <!-- Person - arms reaching to laptop -->
  <path d="M94 108 Q82 112 75 113" stroke="url(#personGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M106 108 Q118 112 125 113" stroke="url(#personGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Particle dots around -->
  <circle cx="55" cy="75" r="1.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="48" cy="90" r="1"   fill="#c084fc" opacity="0.4"/>
  <circle cx="145" cy="130" r="1.5" fill="#818cf8" opacity="0.4"/>
  <circle cx="152" cy="115" r="1"   fill="#c084fc" opacity="0.35"/>

</svg>
